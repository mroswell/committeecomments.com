name: Fetch Regulations.gov Comments2

on:
  workflow_dispatch:
    inputs:
      batch_number:
        description: 'Batch number to run (1, 2, or 3)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

jobs:
  fetch-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Run script
        env:
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
          BATCH_NUMBER: ${{ inputs.batch_number }}
        run: python fetch_regulations_comments1.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: detailed-comments-batch-${{ inputs.batch_number }}
          path: detailed_comments_CDC-2026-0199_batch${{ inputs.batch_number }}.csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add detailed_comments_CDC-2026-0199_batch*.csv
          git diff --staged --quiet || git commit -m "Add batch ${{ inputs.batch_number }} comments [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
