name: Fetch Regulations.gov Comments

on:
  workflow_dispatch:  # Run manually from GitHub Actions tab

jobs:
  fetch-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Run script
        env:
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
        run: python fetch_regulations_comments.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: detailed-comments
          path: detailed_comments.csv
